<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MailCode — Control OpenCode From Anywhere, Via Email</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
    }
    p { color: #888888; font-size: 0.95rem; margin: 0; }
    .loader { width: 28px; height: 28px; border: 3px solid #e5e5e5; border-top-color: #6c5ce7; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    var lang = navigator.language || navigator.userLanguage || 'en'
    var code = lang.split('-')[0]
    var supported = { en: true, zh: true, ja: true, ko: true, fr: true, de: true }
    var target = supported[code] ? '/' + code + '/' : '/en/'
    window.location.replace(target)
  </script>
</head>
<body>
  <div class="loader"></div>
  <p>Redirecting to <a href="/en/" style="color:#6c5ce7">English</a>...</p>
</body>
</html>
